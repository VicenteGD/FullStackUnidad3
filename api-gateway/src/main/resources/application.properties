spring.application.name=api-gateway
server.port=8082

# Deshabilitar Config Server si no lo usas
spring.cloud.config.enabled=false

# Habilitar descubrimiento dinámico de rutas
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Definición manual de rutas (opcional, con discovery locator no es obligatorio)
spring.cloud.gateway.server.webflux.routes[0].id=clientes-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://clientes-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/clientes/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=0

spring.cloud.gateway.server.webflux.routes[1].id=pedidos-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://pedidos-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/pedidos/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=0

spring.cloud.gateway.server.webflux.routes[2].id=catalogo-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://catalogo-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/productos/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=0

spring.cloud.gateway.server.webflux.routes[3].id=inventario-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://inventario-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/ingredientes/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=StripPrefix=0

spring.cloud.gateway.server.webflux.routes[4].id=cupones-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://cupones-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/cupones/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=StripPrefix=0

spring.cloud.gateway.server.webflux.routes[5].id=pagos-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://pagos-service
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/pagos/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=StripPrefix=0

spring.cloud.gateway.server.webflux.routes[6].id=delivery-service
spring.cloud.gateway.server.webflux.routes[6].uri=lb://delivery-service
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/entregas/**
spring.cloud.gateway.server.webflux.routes[6].filters[0]=StripPrefix=0

spring.cloud.gateway.server.webflux.routes[7].id=proveedores-service
spring.cloud.gateway.server.webflux.routes[7].uri=lb://proveedores-service
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/proveedores/**
spring.cloud.gateway.server.webflux.routes[7].filters[0]=StripPrefix=0

# Configuración de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# Logs (opcional)
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.web=DEBUG