# ==============================================================
# CONFIGURACIÓN DE RED (PUERTO DINÁMICO)
# ==============================================================
# 0 le dice a Spring que busque cualquier puerto disponible
server.port=0

# Nombre del servicio en la red
spring.application.name=catalogo-service

# ==============================================================
# CONFIGURACIÓN DE EUREKA (VITAL PARA PUERTO 0)
# ==============================================================
# Genera un ID único para que Eureka reconozca la instancia aunque el puerto cambie
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ==============================================================
# CONFIGURACIÓN DE SPRING CLOUD (CONFIG SERVER OPCIONAL)
# ==============================================================
spring.config.import=optional:configserver:http://localhost:8888

# ==============================================================
# BASE DE DATOS MYSQL (AUTO-CREACIÓN DE TABLAS)
# ==============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/vincalia_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================================================
# SWAGGER / OPENAPI CENTRALIZADO
# ==============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html