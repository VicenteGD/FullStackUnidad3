server:
  port: 0

spring:
  application:
    name: catalogo-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    # Apunta al puerto 3307 que es el que mapeó Docker hacia tu máquina local
    url: jdbc:mysql://localhost:3307/vincalia_db?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/